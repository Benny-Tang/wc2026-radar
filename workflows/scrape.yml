name: WC2026 Scraper → GitHub Pages

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:          # Manual trigger from Actions tab

permissions:
  contents: write             # Needed to commit results.json back

jobs:
  scrape-and-publish:
    name: Scrape & Publish Results
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wc2026-scraper/package.json

      - name: Install dependencies
        working-directory: wc2026-scraper
        run: npm ci

      - name: Run scraper
        working-directory: wc2026-scraper
        env:
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
        run: |
          echo "🚀 Scrape started at $(date -u)"
          node src/scraper.js
          echo "✅ Scrape complete"

      - name: Commit & push results.json
        run: |
          git config user.name  "WC2026 Scraper Bot"
          git config user.email "scraper-bot@users.noreply.github.com"
          git add wc2026-scraper/docs/results.json wc2026-scraper/docs/archive/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "🤖 scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

